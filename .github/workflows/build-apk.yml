name: Build Study Launcher APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get uploaded source archive
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build APK
        run: |
          unzip -q study-launcher-source.zip
          cd android-study-launcher
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          ./gradle-8.10.2/bin/gradle --no-daemon assembleDebug

      - name: Save APK for download
        uses: actions/upload-artifact@v4
        with:
          name: Study-Launcher-APK
          path: android-study-launcher/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
