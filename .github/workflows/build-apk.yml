name: Build Study Launcher APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get project files
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          echo "$PWD/gradle-8.10.2/bin" >> "$GITHUB_PATH"

      - name: Build APK
        run: gradle --no-daemon assembleDebug

      - name: Save installable APK
        uses: actions/upload-artifact@v4
        with:
          name: Study-Launcher-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
